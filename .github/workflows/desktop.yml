name: "Desktop Build (Windows + Linux)"

on:
  push:
    branches: [main]
    paths:
      - "creedflow-desktop/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    branches: [main]
    paths:
      - "creedflow-desktop/**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: creedflow-desktop/pnpm-lock.yaml

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev librsvg2-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "creedflow-desktop/src-tauri -> target"

      - name: Install frontend dependencies
        working-directory: creedflow-desktop
        run: pnpm install

      - name: TypeScript check
        working-directory: creedflow-desktop
        run: pnpm tsc --noEmit

      - name: Rust check
        working-directory: creedflow-desktop/src-tauri
        run: cargo check

      - name: Build Tauri app
        working-directory: creedflow-desktop
        run: pnpm tauri build

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: creedflow-windows
          path: |
            creedflow-desktop/src-tauri/target/release/bundle/nsis/*.exe
            creedflow-desktop/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: creedflow-linux
          path: |
            creedflow-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            creedflow-desktop/src-tauri/target/release/bundle/deb/*.deb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            creedflow-windows/**
            creedflow-linux/**
          generate_release_notes: true
