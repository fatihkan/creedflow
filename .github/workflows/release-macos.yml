name: "macOS Release"

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            label: "Apple Silicon"
          - arch: x86_64
            runner: macos-13
            label: "Intel"

    name: "Build (${{ matrix.label }})"
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify Swift version
        run: swift --version

      - name: Build & Package DMG
        working-directory: CreedFlow
        run: |
          chmod +x Scripts/package-app.sh
          ./Scripts/package-app.sh --dmg

      - name: Rename DMG with architecture
        working-directory: CreedFlow/dist
        run: |
          VERSION=$(grep -A1 'CFBundleShortVersionString' ../Resources/Info.plist | grep '<string>' | sed 's/.*<string>\(.*\)<\/string>/\1/')
          # Script creates CreedFlow-VERSION-ARCH.dmg when --arch is used,
          # or CreedFlow-VERSION-NATIVE_ARCH.dmg without --arch
          # Ensure consistent naming
          for f in *.dmg; do
            TARGET="CreedFlow-${VERSION}-${{ matrix.arch }}.dmg"
            if [ "$f" != "$TARGET" ]; then
              mv "$f" "$TARGET"
            fi
          done
          ls -la *.dmg

      - name: Verify binary architecture
        working-directory: CreedFlow
        run: |
          file dist/CreedFlow.app/Contents/MacOS/CreedFlow
          ACTUAL_ARCH=$(file dist/CreedFlow.app/Contents/MacOS/CreedFlow | awk '{print $NF}')
          echo "Expected: ${{ matrix.arch }}, Actual: $ACTUAL_ARCH"
          if [ "$ACTUAL_ARCH" != "${{ matrix.arch }}" ]; then
            echo "Architecture mismatch!"
            exit 1
          fi

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: CreedFlow/dist/CreedFlow-*-${{ matrix.arch }}.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all DMGs
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name "*.dmg"

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CreedFlow ${{ steps.version.outputs.version }}"
          body: |
            ## CreedFlow ${{ steps.version.outputs.version }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (M1/M2/M3/M4) | `CreedFlow-*-arm64.dmg` |
            | macOS | Intel | `CreedFlow-*-x86_64.dmg` |

            ### Install

            1. Download the DMG for your Mac
            2. Open the DMG and drag CreedFlow to Applications
            3. Launch CreedFlow — the Setup Wizard will guide you

            ### Requirements

            - macOS 14+
            - At least one AI backend: Claude CLI, Codex CLI, Gemini CLI, Ollama, LM Studio, llama.cpp, or MLX

            ---

            [![Buy Me A Coffee](https://img.shields.io/badge/Buy%20Me%20A%20Coffee-Support-FFDD00?style=for-the-badge&logo=buymeacoffee&logoColor=black)](https://buymeacoffee.com/fatihkan)
          files: |
            artifacts/**/*.dmg
          generate_release_notes: true
